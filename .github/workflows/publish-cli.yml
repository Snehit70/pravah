name: Publish CLI

on:
  workflow_run:
    workflows:
      - Release Please
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  BUN_VERSION: 1.3.3
  NODE_VERSION: 24

jobs:
  publish-cli:
    name: Publish CLI
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: main

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun run --cwd packages/cli build

      - name: Check whether npm is behind main
        id: version_check
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/cli/package.json').version")
          PUBLISHED_VERSION=$(npm view pravah version --registry=https://registry.npmjs.org 2>/dev/null || true)

          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "published_version=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"

          if [ -z "$PUBLISHED_VERSION" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          elif [ "$PACKAGE_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when npm is already current
        if: ${{ steps.version_check.outputs.should_publish != 'true' }}
        run: |
          echo "npm already has pravah@${{ steps.version_check.outputs.published_version }};"
          echo "main is at pravah@${{ steps.version_check.outputs.package_version }};"
          echo "skipping publish."

      - name: Publish CLI to npm
        if: ${{ steps.version_check.outputs.should_publish == 'true' }}
        working-directory: packages/cli
        run: npm publish --provenance
