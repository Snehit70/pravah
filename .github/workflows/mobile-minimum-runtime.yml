name: Mobile Minimum Runtime

on:
  workflow_dispatch:
    inputs:
      native_runtime:
        description: Exact published native runtime (for example native-2)
        required: true
        type: string
      confirmation:
        description: Type SET MINIMUM RUNTIME native-N
        required: true
        type: string
      reason:
        description: Emergency compatibility reason
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: mobile-release
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.3

jobs:
  set-minimum-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          MOBILE_RELEASE_DEPLOY_SECRET: ${{ secrets.MOBILE_RELEASE_DEPLOY_SECRET }}
          NATIVE_RUNTIME: ${{ inputs.native_runtime }}
          CONFIRMATION: ${{ inputs.confirmation }}
          REASON: ${{ inputs.reason }}
        run: bun scripts/mobile-release/release-command.ts minimum-runtime
