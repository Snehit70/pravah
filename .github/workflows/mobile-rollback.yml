name: Mobile OTA Rollback

on:
  workflow_dispatch:
    inputs:
      defective_version:
        description: Exact published version being reversed
        required: true
        type: string
      restores_version:
        description: Exact published version whose source should be restored
        required: true
        type: string
      reason:
        description: User-facing rollback reason
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: mobile-release
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.3

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      attempt_id: ${{ steps.reserve.outputs.attempt_id }}
      version: ${{ steps.reserve.outputs.version }}
      revision: ${{ steps.reserve.outputs.revision }}
      runtime: ${{ steps.target.outputs.runtime }}
      source_sha: ${{ steps.target.outputs.source_sha }}
      status: ${{ steps.reserve.outputs.status }}
      eas_update_id: ${{ steps.reserve.outputs.eas_update_id }}
      eas_branch: ${{ steps.reserve.outputs.eas_branch }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - id: state
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
        run: bun scripts/mobile-release/release-command.ts state
      - id: target
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          MOBILE_RELEASE_DEPLOY_SECRET: ${{ secrets.MOBILE_RELEASE_DEPLOY_SECRET }}
          DEFECTIVE_VERSION: ${{ inputs.defective_version }}
          RESTORES_VERSION: ${{ inputs.restores_version }}
          REASON: ${{ inputs.reason }}
        run: bun scripts/mobile-release/release-command.ts rollback-target
      - name: Require the currently supported native runtime
        env:
          TARGET_RUNTIME: ${{ steps.target.outputs.runtime }}
          SUPPORTED_RUNTIME: ${{ steps.state.outputs.runtime }}
        run: test "$TARGET_RUNTIME" = "$SUPPORTED_RUNTIME"
      - id: reserve
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          MOBILE_RELEASE_DEPLOY_SECRET: ${{ secrets.MOBILE_RELEASE_DEPLOY_SECRET }}
          EXPECTED_REVISION: ${{ steps.state.outputs.revision }}
          DELIVERY: rollback
          SOURCE_SHA: ${{ steps.target.outputs.source_sha }}
          SOURCE_REF: rollback:${{ inputs.restores_version }}
          RELEASE_TITLE: Roll back ${{ inputs.defective_version }}
          RELEASE_NOTES: ${{ inputs.reason }}
          NATIVE_RUNTIME: ${{ steps.target.outputs.runtime }}
          NATIVE_FINGERPRINT: ${{ steps.target.outputs.fingerprint }}
          ROLLBACK_OF_VERSION: ${{ inputs.defective_version }}
          RESTORES_VERSION: ${{ inputs.restores_version }}
        run: bun scripts/mobile-release/release-command.ts reserve

  stage-update:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.update.outputs.branch }}
      update_id: ${{ steps.update.outputs.update_id }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - id: update
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_MOBILE_RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          MOBILE_NATIVE_RUNTIME: ${{ needs.prepare.outputs.runtime }}
          RELEASE_NOTES: ${{ inputs.reason }}
        run: |
          if [ "${{ needs.prepare.outputs.status }}" = staged ]; then
            echo "branch=${{ needs.prepare.outputs.eas_branch }}" >> "$GITHUB_OUTPUT"
            echo "update_id=${{ needs.prepare.outputs.eas_update_id }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BRANCH="release-candidate-${{ needs.prepare.outputs.version }}"
          bunx eas-cli update --branch "$BRANCH" --message "$RELEASE_NOTES" --non-interactive --json > eas-update.json
          UPDATE_ID=$(node -e "const value=require('./eas-update.json'); const item=Array.isArray(value)?value[0]:value; const id=item?.group ?? item?.id; if (!id) process.exit(1); process.stdout.write(id)")
          bunx eas-cli update:list --branch "$BRANCH" --limit 10 --non-interactive --json > eas-update-list.json
          VERIFIED=$(node -e "const items=require('./eas-update-list.json'); const id=process.argv[1]; process.stdout.write(items.some(item => item.group === id || item.id === id) ? 'yes' : 'no')" "$UPDATE_ID")
          test "$VERIFIED" = yes
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "update_id=$UPDATE_ID" >> "$GITHUB_OUTPUT"

  promote-and-finalize:
    needs: [prepare, stage-update]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          MOBILE_RELEASE_DEPLOY_SECRET: ${{ secrets.MOBILE_RELEASE_DEPLOY_SECRET }}
          ATTEMPT_ID: ${{ needs.prepare.outputs.attempt_id }}
          EAS_UPDATE_ID: ${{ needs.stage-update.outputs.update_id }}
          EAS_BRANCH: ${{ needs.stage-update.outputs.branch }}
        run: bun scripts/mobile-release/release-command.ts stage
      - working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: bunx eas-cli channel:edit preview --branch "${{ needs.stage-update.outputs.branch }}" --non-interactive
      - env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          MOBILE_RELEASE_DEPLOY_SECRET: ${{ secrets.MOBILE_RELEASE_DEPLOY_SECRET }}
          ATTEMPT_ID: ${{ needs.prepare.outputs.attempt_id }}
          EXPECTED_REVISION: ${{ needs.prepare.outputs.revision }}
        run: |
          if ! bun scripts/mobile-release/release-command.ts publish; then
            REASON="Reconcile promoted rollback before final acknowledgement" \
              bun scripts/mobile-release/release-command.ts reconcile
            bun scripts/mobile-release/release-command.ts publish
          fi

  record-failure:
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      needs.stage-update.result == 'failure'
    needs: [prepare, stage-update, promote-and-finalize]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          MOBILE_RELEASE_DEPLOY_SECRET: ${{ secrets.MOBILE_RELEASE_DEPLOY_SECRET }}
          ATTEMPT_ID: ${{ needs.prepare.outputs.attempt_id }}
          REASON: Rollback workflow failed; retry the same restoration target.
        run: bun scripts/mobile-release/release-command.ts fail
