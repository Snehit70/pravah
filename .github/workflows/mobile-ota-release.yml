name: Mobile OTA Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: mobile-release
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.3
  MOBILE_CONVEX_URL: https://befitting-swan-125.eu-west-1.convex.cloud
  MOBILE_CONVEX_SITE_URL: https://befitting-swan-125.eu-west-1.convex.site

jobs:
  prepare:
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'mobile-ota')
    runs-on: ubuntu-latest
    outputs:
      attempt_id: ${{ steps.reserve.outputs.attempt_id }}
      version: ${{ steps.reserve.outputs.version }}
      revision: ${{ steps.reserve.outputs.revision }}
      runtime: ${{ steps.state.outputs.runtime }}
      fingerprint: ${{ steps.state.outputs.fingerprint }}
      title: ${{ steps.notes.outputs.title }}
      notes: ${{ steps.notes.outputs.notes }}
      pull_requests: ${{ steps.notes.outputs.pull_requests }}
      source_sha: ${{ steps.source.outputs.sha }}
      status: ${{ steps.reserve.outputs.status }}
      eas_update_id: ${{ steps.reserve.outputs.eas_update_id }}
      eas_branch: ${{ steps.reserve.outputs.eas_branch }}
      backend_changed: ${{ steps.backend.outputs.changed }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Verify canonical Convex deployment
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
        run: test "$CONVEX_URL" = "$MOBILE_CONVEX_URL"
      - id: backend
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if git diff --quiet "$BASE_SHA" HEAD -- convex/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - id: state
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
        run: bun scripts/mobile-release/release-command.ts state
      - id: history
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
        run: bun scripts/mobile-release/release-command.ts history
      - id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_LABEL: mobile-ota
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
          PUBLISHED_PULL_REQUESTS_JSON: ${{ steps.history.outputs.pull_requests_json }}
        run: bun scripts/mobile-release/collect-notes.ts
      - name: Verify supported native fingerprint
        working-directory: apps/mobile
        env:
          SUPPORTED_FINGERPRINT: ${{ steps.state.outputs.fingerprint }}
          EXPO_PUBLIC_MOBILE_RELEASE_VERSION: ${{ steps.state.outputs.version }}
          MOBILE_NATIVE_RUNTIME: ${{ steps.state.outputs.runtime }}
        run: |
          SOURCE_FINGERPRINT=$(bunx fingerprint fingerprint:generate --platform android | node -e "let input=''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => process.stdout.write(JSON.parse(input).hash))")
          test "$SOURCE_FINGERPRINT" = "$SUPPORTED_FINGERPRINT"
      - id: reserve
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          MOBILE_RELEASE_DEPLOY_SECRET: ${{ secrets.MOBILE_RELEASE_DEPLOY_SECRET }}
          EXPECTED_REVISION: ${{ steps.state.outputs.revision }}
          DELIVERY: ota
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
          SOURCE_REF: refs/heads/main
          RELEASE_TITLE: ${{ steps.notes.outputs.title }}
          RELEASE_NOTES: ${{ steps.notes.outputs.notes }}
          PULL_REQUESTS: ${{ steps.notes.outputs.pull_requests }}
          NATIVE_RUNTIME: ${{ steps.state.outputs.runtime }}
          NATIVE_FINGERPRINT: ${{ steps.state.outputs.fingerprint }}
        run: bun scripts/mobile-release/release-command.ts reserve

  deploy-backend:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        if: ${{ needs.prepare.outputs.backend_changed == 'true' }}
        run: bunx convex deploy --typecheck enable
      - name: Verify unchanged backend release authority
        if: ${{ needs.prepare.outputs.backend_changed != 'true' }}
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
        run: bun scripts/mobile-release/release-command.ts state

  stage-update:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.update.outputs.branch }}
      update_id: ${{ steps.update.outputs.update_id }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - id: update
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_MOBILE_RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          MOBILE_NATIVE_RUNTIME: ${{ needs.prepare.outputs.runtime }}
          EXPO_PUBLIC_CONVEX_URL: ${{ env.MOBILE_CONVEX_URL }}
          EXPO_PUBLIC_CONVEX_SITE_URL: ${{ env.MOBILE_CONVEX_SITE_URL }}
          RELEASE_NOTES: ${{ needs.prepare.outputs.notes }}
        run: |
          if [ "${{ needs.prepare.outputs.status }}" = staged ]; then
            echo "branch=${{ needs.prepare.outputs.eas_branch }}" >> "$GITHUB_OUTPUT"
            echo "update_id=${{ needs.prepare.outputs.eas_update_id }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BRANCH="release-candidate-${{ needs.prepare.outputs.version }}"
          bunx eas-cli env:create preview --name EXPO_PUBLIC_CONVEX_URL --value "$EXPO_PUBLIC_CONVEX_URL" --visibility plaintext --force --non-interactive
          bunx eas-cli env:create preview --name EXPO_PUBLIC_CONVEX_SITE_URL --value "$EXPO_PUBLIC_CONVEX_SITE_URL" --visibility plaintext --force --non-interactive
          bunx eas-cli update --branch "$BRANCH" --message "$RELEASE_NOTES" --non-interactive --json > eas-update.json
          UPDATE_ID=$(node -e "const value=require('./eas-update.json'); const item=Array.isArray(value)?value[0]:value; const id=item?.group ?? item?.id; if (!id) process.exit(1); process.stdout.write(id)")
          bunx eas-cli update:list --branch "$BRANCH" --limit 10 --non-interactive --json > eas-update-list.json
          VERIFIED=$(node -e "const value=require('./eas-update-list.json'); const items=Array.isArray(value)?value:(value.currentPage??value.updates??value.data??[]); const id=process.argv[1]; process.stdout.write(items.some(item => item.group === id || item.id === id) ? 'yes' : 'no')" "$UPDATE_ID")
          test "$VERIFIED" = yes
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "update_id=$UPDATE_ID" >> "$GITHUB_OUTPUT"

  promote-and-finalize:
    needs: [prepare, deploy-backend, stage-update]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Record staged update
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          MOBILE_RELEASE_DEPLOY_SECRET: ${{ secrets.MOBILE_RELEASE_DEPLOY_SECRET }}
          ATTEMPT_ID: ${{ needs.prepare.outputs.attempt_id }}
          EAS_UPDATE_ID: ${{ needs.stage-update.outputs.update_id }}
          EAS_BRANCH: ${{ needs.stage-update.outputs.branch }}
        run: bun scripts/mobile-release/release-command.ts stage
      - name: Promote exact candidate branch
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: bunx eas-cli channel:edit preview --branch "${{ needs.stage-update.outputs.branch }}" --non-interactive
      - name: Finalize ledger
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          MOBILE_RELEASE_DEPLOY_SECRET: ${{ secrets.MOBILE_RELEASE_DEPLOY_SECRET }}
          ATTEMPT_ID: ${{ needs.prepare.outputs.attempt_id }}
          EXPECTED_REVISION: ${{ needs.prepare.outputs.revision }}
        run: |
          if ! bun scripts/mobile-release/release-command.ts publish; then
            REASON="Reconcile promoted EAS update before final acknowledgement" \
              bun scripts/mobile-release/release-command.ts reconcile
            bun scripts/mobile-release/release-command.ts publish
          fi

  record-failure:
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      (needs.deploy-backend.result == 'failure' ||
       needs.stage-update.result == 'failure')
    needs: [prepare, deploy-backend, stage-update, promote-and-finalize]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          MOBILE_RELEASE_DEPLOY_SECRET: ${{ secrets.MOBILE_RELEASE_DEPLOY_SECRET }}
          ATTEMPT_ID: ${{ needs.prepare.outputs.attempt_id }}
          REASON: Automatic OTA workflow failed; retry the same merge commit.
        run: bun scripts/mobile-release/release-command.ts fail
