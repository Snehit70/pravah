name: Mobile Release Classification

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]
    paths:
      - "apps/mobile/**"
      - "convex/**"
      - "bun.lock"

permissions:
  contents: read
  pull-requests: read

env:
  BUN_VERSION: 1.3.3

jobs:
  classify:
    name: Classify mobile release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read supported runtime
        id: release_state
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
        run: |
          STATE=$(bun scripts/mobile-release/read-state.ts)
          echo "fingerprint=$(node -e 'const state=JSON.parse(process.argv[1]); process.stdout.write(state.supportedFingerprint)' "$STATE")" >> "$GITHUB_OUTPUT"

      - name: Validate classification
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
          SUPPORTED_FINGERPRINT: ${{ steps.release_state.outputs.fingerprint }}
        run: bun scripts/mobile-release/check-pr.ts
