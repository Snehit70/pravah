name: Mobile APK Release

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Exact commit, tag, or ref to release
        required: true
        type: string
      title:
        description: User-facing release title
        required: true
        type: string
      release_notes:
        description: Optional dispatcher introduction (merged PR notes are appended)
        required: false
        type: string
      backend_already_deployed:
        description: Recovery only; verify state instead of redeploying Convex
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: mobile-release
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.3

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      attempt_id: ${{ steps.reserve.outputs.attempt_id }}
      version: ${{ steps.reserve.outputs.version }}
      revision: ${{ steps.reserve.outputs.revision }}
      runtime: ${{ steps.runtime.outputs.value }}
      fingerprint: ${{ steps.fingerprint.outputs.value }}
      source_sha: ${{ steps.source.outputs.sha }}
      notes: ${{ steps.combined.outputs.notes }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - id: state
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
        run: bun scripts/mobile-release/release-command.ts state
      - id: history
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
        run: bun scripts/mobile-release/release-command.ts history
      - id: runtime
        env:
          CURRENT_RUNTIME: ${{ steps.state.outputs.runtime }}
        run: |
          VALUE=$(node -e "const match=/^native-(\\d+)$/.exec(process.env.CURRENT_RUNTIME); if (!match) process.exit(1); process.stdout.write('native-'+(Number(match[1])+1))")
          echo "value=$VALUE" >> "$GITHUB_OUTPUT"
      - id: candidate
        env:
          CURRENT_VERSION: ${{ steps.state.outputs.version }}
        run: |
          VALUE=$(node -e "const match=/^(\\d+)\\.(\\d+)\\.(\\d+)$/.exec(process.env.CURRENT_VERSION); if (!match) process.exit(1); process.stdout.write(match[1]+'.'+match[2]+'.'+(Number(match[3])+1))")
          echo "value=$VALUE" >> "$GITHUB_OUTPUT"
      - id: fingerprint
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_MOBILE_RELEASE_VERSION: ${{ steps.candidate.outputs.value }}
          MOBILE_NATIVE_RUNTIME: ${{ steps.runtime.outputs.value }}
        run: |
          VALUE=$(bunx fingerprint fingerprint:generate --platform android | node -e "let input=''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => process.stdout.write(JSON.parse(input).hash))")
          echo "value=$VALUE" >> "$GITHUB_OUTPUT"
      - id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_LABEL: mobile-native
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
          PUBLISHED_PULL_REQUESTS_JSON: ${{ steps.history.outputs.pull_requests_json }}
        run: bun scripts/mobile-release/collect-notes.ts
      - id: combined
        env:
          INTRODUCTION: ${{ inputs.release_notes }}
          PR_NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          DELIMITER="NOTES_$(openssl rand -hex 12)"
          {
            echo "notes<<$DELIMITER"
            if [ -n "$INTRODUCTION" ]; then
              printf '%s\n\n' "$INTRODUCTION"
            fi
            printf '%s\n' "$PR_NOTES"
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"
      - id: reserve
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          MOBILE_RELEASE_DEPLOY_SECRET: ${{ secrets.MOBILE_RELEASE_DEPLOY_SECRET }}
          EXPECTED_REVISION: ${{ steps.state.outputs.revision }}
          DELIVERY: native
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
          SOURCE_REF: ${{ inputs.source_ref }}
          RELEASE_TITLE: ${{ inputs.title }}
          RELEASE_NOTES: ${{ steps.combined.outputs.notes }}
          PULL_REQUESTS: ${{ steps.notes.outputs.pull_requests }}
          NATIVE_RUNTIME: ${{ steps.runtime.outputs.value }}
          NATIVE_FINGERPRINT: ${{ steps.fingerprint.outputs.value }}
        run: bun scripts/mobile-release/release-command.ts reserve

  deploy-backend:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        if: ${{ !inputs.backend_already_deployed }}
        run: bunx convex deploy --typecheck enable
      - name: Verify predeployed release authority
        if: ${{ inputs.backend_already_deployed }}
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
        run: bun scripts/mobile-release/release-command.ts state

  build-and-stage:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      artifact_url: ${{ steps.release.outputs.artifact_url }}
      checksum_url: ${{ steps.release.outputs.checksum_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Build exact native candidate
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_MOBILE_RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          MOBILE_NATIVE_RUNTIME: ${{ needs.prepare.outputs.runtime }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          MOBILE_ANDROID_VERSION_CODE=$(node -e "const [major,minor,patch]=process.env.RELEASE_VERSION.split('.').map(Number); process.stdout.write(String(major*1000000+minor*1000+patch))")
          export MOBILE_ANDROID_VERSION_CODE
          bunx eas-cli env:create preview --name EXPO_PUBLIC_MOBILE_RELEASE_VERSION --value "$EXPO_PUBLIC_MOBILE_RELEASE_VERSION" --visibility plaintext --force --non-interactive
          bunx eas-cli env:create preview --name MOBILE_NATIVE_RUNTIME --value "$MOBILE_NATIVE_RUNTIME" --visibility plaintext --force --non-interactive
          bunx eas-cli env:create preview --name MOBILE_ANDROID_VERSION_CODE --value "$MOBILE_ANDROID_VERSION_CODE" --visibility plaintext --force --non-interactive
          bunx eas-cli build -p android --profile preview --non-interactive --wait --json > eas-build.json
      - name: Download and checksum APK
        working-directory: apps/mobile
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          ARTIFACT_URL=$(node -e "const builds=require('./eas-build.json'); const build=Array.isArray(builds)?builds[0]:builds; const url=build?.artifacts?.buildUrl; if (!url) process.exit(1); process.stdout.write(url)")
          curl --fail --location "$ARTIFACT_URL" --output "pravah-$VERSION.apk"
          md5sum "pravah-$VERSION.apk" > "pravah-$VERSION.apk.md5"
          sha256sum "pravah-$VERSION.apk" > "pravah-$VERSION.apk.sha256"
      - id: release
        name: Create verified draft release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
          RELEASE_NOTES: ${{ needs.prepare.outputs.notes }}
        run: |
          TAG="mobile-v$VERSION"
          NOTES_FILE=$(mktemp)
          printf '%s\n' "$RELEASE_NOTES" > "$NOTES_FILE"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            IS_DRAFT=$(gh release view "$TAG" --json isDraft --jq .isDraft --repo "$GITHUB_REPOSITORY")
            if [ "$IS_DRAFT" = true ]; then
              gh release edit "$TAG" \
                --title "$TAG" \
                --notes-file "$NOTES_FILE" \
                --repo "$GITHUB_REPOSITORY"
              gh release upload "$TAG" \
                "apps/mobile/pravah-$VERSION.apk" \
                "apps/mobile/pravah-$VERSION.apk.md5" \
                "apps/mobile/pravah-$VERSION.apk.sha256" \
                --clobber \
                --repo "$GITHUB_REPOSITORY"
            fi
          else
            gh release create "$TAG" \
              "apps/mobile/pravah-$VERSION.apk" \
              "apps/mobile/pravah-$VERSION.apk.md5" \
              "apps/mobile/pravah-$VERSION.apk.sha256" \
              --draft \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              --target "$SOURCE_SHA" \
              --repo "$GITHUB_REPOSITORY"
          fi
          RELEASE=$(gh release view "$TAG" --json assets --repo "$GITHUB_REPOSITORY")
          export RELEASE
          APK_URL=$(node -e "const r=JSON.parse(process.env.RELEASE); const a=r.assets.find(x=>x.name.endsWith('.apk')); if(!a) process.exit(1); process.stdout.write(a.url)")
          CHECKSUM_URL=$(node -e "const r=JSON.parse(process.env.RELEASE); const a=r.assets.find(x=>x.name.endsWith('.apk.sha256')); if(!a) process.exit(1); process.stdout.write(a.url)")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "artifact_url=$APK_URL" >> "$GITHUB_OUTPUT"
          echo "checksum_url=$CHECKSUM_URL" >> "$GITHUB_OUTPUT"

  publish-and-finalize:
    needs: [prepare, deploy-backend, build-and-stage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Record verified draft assets
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          MOBILE_RELEASE_DEPLOY_SECRET: ${{ secrets.MOBILE_RELEASE_DEPLOY_SECRET }}
          ATTEMPT_ID: ${{ needs.prepare.outputs.attempt_id }}
          GITHUB_TAG: ${{ needs.build-and-stage.outputs.tag }}
          ARTIFACT_URL: ${{ needs.build-and-stage.outputs.artifact_url }}
          CHECKSUM_URL: ${{ needs.build-and-stage.outputs.checksum_url }}
        run: bun scripts/mobile-release/release-command.ts stage
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build-and-stage.outputs.tag }}
        run: gh release edit "$TAG" --draft=false --repo "$GITHUB_REPOSITORY"
      - name: Finalize ledger
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          MOBILE_RELEASE_DEPLOY_SECRET: ${{ secrets.MOBILE_RELEASE_DEPLOY_SECRET }}
          ATTEMPT_ID: ${{ needs.prepare.outputs.attempt_id }}
          EXPECTED_REVISION: ${{ needs.prepare.outputs.revision }}
        run: |
          if ! bun scripts/mobile-release/release-command.ts publish; then
            REASON="Reconcile published GitHub release before final acknowledgement" \
              bun scripts/mobile-release/release-command.ts reconcile
            bun scripts/mobile-release/release-command.ts publish
          fi

  record-failure:
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      (needs.deploy-backend.result == 'failure' ||
       needs.build-and-stage.result == 'failure')
    needs: [prepare, deploy-backend, build-and-stage, publish-and-finalize]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          MOBILE_RELEASE_DEPLOY_SECRET: ${{ secrets.MOBILE_RELEASE_DEPLOY_SECRET }}
          ATTEMPT_ID: ${{ needs.prepare.outputs.attempt_id }}
          REASON: Native release workflow failed; retry the same source commit.
        run: bun scripts/mobile-release/release-command.ts fail
