name: Mobile APK Release

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: Notes to publish on the mobile release
        required: false
        type: string

permissions:
  contents: write

env:
  BUN_VERSION: 1.3.3
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  mobile-apk-release:
    name: Build and publish mobile APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        working-directory: .
        run: bun install --frozen-lockfile

      - name: Read mobile version
        id: version
        run: |
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$APP_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "app.json version ($APP_VERSION) must match package.json version ($PACKAGE_VERSION)" >&2
            exit 1
          fi
          echo "value=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=mobile-v$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build preview APK with EAS
        run: bunx eas-cli build -p android --profile preview --non-interactive --wait --json > eas-build.json

      - name: Download APK artifact
        run: |
          ARTIFACT_URL=$(node -e "const builds=require('./eas-build.json'); const build=Array.isArray(builds)?builds[0]:builds; const url=build?.artifacts?.buildUrl; if (!url) process.exit(1); console.log(url)")
          curl --fail --location "$ARTIFACT_URL" --output "pravah-${{ steps.version.outputs.value }}.apk"
          md5sum "pravah-${{ steps.version.outputs.value }}.apk" > "pravah-${{ steps.version.outputs.value }}.apk.md5"

      - name: Publish GitHub release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.value }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          NOTES_FILE=$(mktemp)
          if [ -n "$RELEASE_NOTES" ]; then
            printf '%s\n' "$RELEASE_NOTES" > "$NOTES_FILE"
          else
            printf 'Manual Pravah mobile APK release %s.\n' "$VERSION" > "$NOTES_FILE"
          fi

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" \
              "apps/mobile/pravah-$VERSION.apk" \
              "apps/mobile/pravah-$VERSION.apk.md5" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              --target "$GITHUB_SHA" \
              --repo "$GITHUB_REPOSITORY"
          fi

          gh release upload "$TAG" \
            "apps/mobile/pravah-$VERSION.apk" \
            "apps/mobile/pravah-$VERSION.apk.md5" \
            --clobber \
            --repo "$GITHUB_REPOSITORY"
